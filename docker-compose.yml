services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refferq-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://refferq:refferq@db:5432/refferq
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string-min-32-chars}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-Refferq <onboarding@resend.dev>}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://refferq-neon.vercel.app/}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - refferq-network

  db:
    image: postgres:16-alpine
    container_name: refferq-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=refferq
      - POSTGRES_PASSWORD=refferq
      - POSTGRES_DB=refferq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refferq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - refferq-network

volumes:
  postgres_data:

networks:
  refferq-network:
    driver: bridge
